# docker-compose.yml
# Academic Policy Graph RAG — API service
#
# Usage:
#   export MY_UID=$(id -u) MY_GID=$(id -g)   # align file ownership
#   docker-compose up --build
#
# Or add to your shell profile:
#   export MY_UID=$(id -u) MY_GID=$(id -g)
#
# Environment:
#   Copy .env.example → .env and populate OPENROUTER_API_KEY before running.
#   The .env file is loaded via `env_file` when present.

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

    ports:
      - "8000:8000"

    # ── Permission fix ────────────────────────────────────────────────────────
    # Run as the same UID/GID as the host user so that any files written by the
    # container into mounted volumes (data/, domains/) have the correct host
    # ownership, preventing "Permission Denied" errors in both directions.
    # Set MY_UID and MY_GID in your shell before running:
    #   export MY_UID=$(id -u) MY_GID=$(id -g)
    user: "${MY_UID:-1000}:${MY_GID:-1000}"

    # ── Environment variables ─────────────────────────────────────────────────
    # OPENROUTER_API_KEY is forwarded from the host environment into the container.
    # The application also calls load_dotenv() internally, so placing a .env file
    # in the project root is the recommended approach for local development.
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

    # ── Runtime volume mounts ─────────────────────────────────────────────────
    # data/     — chunks, graphs, eval artifacts generated by ingestion scripts
    # domains/  — academic policy configuration (domain.json, document_registry)
    # Both are kept on the host and mounted read-write so the API can read
    # generated artifacts and pipelines can write new ones without rebuilding
    # the image.
    volumes:
      - ./data:/app/data
      - ./domains:/app/domains

    restart: unless-stopped
